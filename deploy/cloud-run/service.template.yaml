apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  annotations:
    run.googleapis.com/ingress: all
  labels:
    cloud.googleapis.com/location: ${GCP_REGION}
  name: ${SERVICE_NAME}
  namespace: '${GCP_PROJECT_NUMBER}'
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: '${MAX_INSTANCES}'
        run.googleapis.com/client-name: gcloud
        run.googleapis.com/container-dependencies: '{"coldtrace-platform":["cloud-sql-proxy"]}'
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/startup-cpu-boost: 'true'
    spec:
      containerConcurrency: 80
      containers:
      - name: coldtrace-platform
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: Production
        - name: ConnectionStrings__DefaultConnection
          value: server=%DATABASE_URL%;port=3306;user=%DATABASE_USER%;password=%DATABASE_PASSWORD%;database=%DATABASE_SCHEMA%;sslmode=Disabled;AllowPublicKeyRetrieval=True
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              key: latest
              name: ${DB_SECRET_NAME}
        - name: DATABASE_URL
          value: 127.0.0.1
        - name: DATABASE_SCHEMA
          value: ${DATABASE_NAME}
        - name: DATABASE_USER
          value: ${DATABASE_USER}
        - name: CORS_ALLOWED_ORIGINS
          value: '${CORS_ALLOWED_ORIGINS}'
        - name: AiAssistance__Enabled
          value: '${AI_ASSISTANCE_ENABLED}'
        - name: AiAssistance__Provider
          value: '${AI_MODEL_PROVIDER}'
        - name: AiAssistance__Model
          value: '${AI_MODEL_NAME}'
        - name: AiAssistance__Endpoint
          value: '${OLLAMA_BASE_URL}'
        - name: AiAssistance__ApiKey
          valueFrom:
            secretKeyRef:
              key: latest
              name: ${OPENAI_API_KEY_SECRET_NAME}
        - name: AiAssistance__RequestTimeout
          value: '${AI_REQUEST_TIMEOUT}'
        - name: Authentication__Social__Google__ClientId
          value: '${GOOGLE_OAUTH_CLIENT_ID}'
        - name: Authentication__Social__Google__ClientSecret
          valueFrom:
            secretKeyRef:
              key: latest
              name: ${GOOGLE_OAUTH_CLIENT_SECRET_NAME}
        - name: Authentication__Social__Google__RedirectUri
          value: '${GOOGLE_OAUTH_REDIRECT_URI}'
        - name: Authentication__Social__Apple__ClientId
          value: '${APPLE_OAUTH_CLIENT_ID}'
        - name: Authentication__Social__Apple__RedirectUri
          value: '${APPLE_OAUTH_REDIRECT_URI}'
        - name: Authentication__Social__Apple__TeamId
          value: '${APPLE_TEAM_ID}'
        - name: Authentication__Social__Apple__KeyId
          value: '${APPLE_KEY_ID}'
        - name: Authentication__Social__Apple__PrivateKey
          valueFrom:
            secretKeyRef:
              key: latest
              name: ${APPLE_PRIVATE_KEY_SECRET_NAME}
        - name: Billing__PlanCatalog__OperationsStripePriceId
          value: '${STRIPE_OPERATIONS_PRICE_ID}'
        - name: Billing__PlanCatalog__ComplianceAiStripePriceId
          value: '${STRIPE_COMPLIANCE_AI_PRICE_ID}'
        - name: Billing__Stripe__SecretKey
          valueFrom:
            secretKeyRef:
              key: latest
              name: ${STRIPE_SECRET_KEY_SECRET_NAME}
        - name: Billing__Stripe__WebhookSigningSecret
          valueFrom:
            secretKeyRef:
              key: latest
              name: ${STRIPE_WEBHOOK_SECRET_NAME}
        - name: Billing__Stripe__CheckoutSuccessUrl
          value: '${BILLING_CHECKOUT_SUCCESS_URL}'
        - name: Billing__Stripe__CheckoutCancelUrl
          value: '${BILLING_CHECKOUT_CANCEL_URL}'
        - name: Billing__Stripe__CustomerPortalReturnUrl
          value: '${BILLING_CUSTOMER_PORTAL_RETURN_URL}'
        image: ${IMAGE_URI}
        ports:
        - containerPort: 8080
          name: http1
        resources:
          limits:
            cpu: '1'
            memory: 1Gi
        startupProbe:
          failureThreshold: 1
          periodSeconds: 240
          tcpSocket:
            port: 8080
          timeoutSeconds: 240
      - name: cloud-sql-proxy
        args:
        - --structured-logs
        - --address=0.0.0.0
        - --port=3306
        - ${DB_INSTANCE_CONNECTION_NAME}
        image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2
        resources:
          limits:
            cpu: '1'
            memory: 256Mi
        startupProbe:
          failureThreshold: 12
          periodSeconds: 10
          tcpSocket:
            port: 3306
          timeoutSeconds: 5
      serviceAccountName: ${CLOUD_RUN_SERVICE_ACCOUNT}
      timeoutSeconds: 300
  traffic:
  - latestRevision: true
    percent: 100
