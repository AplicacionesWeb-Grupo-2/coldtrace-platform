services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-coldtrace_platform}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - coldtrace_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ConnectionStrings__DefaultConnection: server=mysql;port=3306;user=root;password=${MYSQL_ROOT_PASSWORD:-root};database=${MYSQL_DATABASE:-coldtrace_platform}
      TokenSettings__Secret: ${JWT_SECRET:-ColdTraceDevelopmentJwtSecretKeyForHS256NeedsAtLeast32Bytes}
      TokenSettings__ExpirationDays: ${JWT_EXPIRATION_DAYS:-7}
      AiAssistance__Enabled: ${AI_ASSISTANCE_ENABLED:-false}
      AiAssistance__Provider: ${AI_MODEL_PROVIDER:-disabled}
      AiAssistance__Model: ${AI_MODEL_NAME:-}
      AiAssistance__Endpoint: ${OLLAMA_BASE_URL:-}
      AiAssistance__ApiKey: ${OPENAI_API_KEY:-}
      AiAssistance__RequestTimeout: ${AI_REQUEST_TIMEOUT:-30s}
    ports:
      - "${API_PORT:-5271}:8080"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  coldtrace_mysql_data:
